<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <!-- Lock body (green = unlocked/open) -->
  <rect x="3" y="9" width="14" height="10" rx="2.5" fill="#10B981"/>
  <!-- Lock shackle (open – lifted on left) -->
  <path d="M6.5 9V5a3.5 3.5 0 0 1 7 0"
        fill="none" stroke="#10B981" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="10" cy="14" r="1.4" fill="#FFFFFF" opacity="0.85"/>
  <rect x="9.3" y="14" width="1.4" height="2.2" rx="0.7" fill="#FFFFFF" opacity="0.85"/>
</svg>
